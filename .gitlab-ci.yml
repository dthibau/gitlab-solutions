variables:
  MAVEN_OPTS: "-Dhttps.protocols=TLSv1.2 -Dmaven.repo.local=$CI_PROJECT_DIR/.m2/repository -Dorg.slf4j.simpleLogger.log.org.apache.maven.cli.transfer.Slf4jMavenTransferListener=WARN -Dorg.slf4j.simpleLogger.showDateTime=true -Djava.awt.headless=true"
  # As of Maven 3.3.0 instead of this you may define these options in `.mvn/maven.config` so the same config is used
  # when running from the command line.
  # `installAtEnd` and `deployAtEnd` are only effective with recent version of the corresponding plugins.
  INTEGRATION_URL: /home/gitlab-runner
cache:
  paths:
    - .m2/repository  

default:
  image: eclipse-temurin:21-jdk

stages:
  - build
  - analyse
  - deploiement
  
build:
  stage: build
  script:
    - './mvnw $MAVEN_OPTS clean package'
  artifacts:
    paths:
      - application/target/*.jar    

vulnerability:
  stage: analyse
  script:
      - './mvnw -DnvdApiKey=$NVD_API_KEY dependency-check:aggregate'
  dependencies: []

qualité:
  stage: analyse
  script:
    - './mvnw -Dsonar.host.url=http://gitlab-sonar:9000 -Dsonar.token=$SONAR_TOKEN verify sonar:sonar'
  dependencies: []

deploiement:
  stage: deploiement
  tags:
    - shell
  script:
    - 'whoami'
    - 'cp application/target/*.jar $INTEGRATION_URL/app.jar'
  dependencies:
    - build
