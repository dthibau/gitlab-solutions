include:
  - project: 'formation/gabarit'
    ref: main
    file: '/maven-template.yml'
  - template: Security/SAST.gitlab-ci.yml
  - template: Security/Secret-Detection.gitlab-ci.yml

variables:
  ARTEFACT: application/target/*.jar
  INTEGRATION_URL: /home/gitlab-runner

workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_TAG =~ /^v.*/
    - if: $CI_COMMIT_BRANCH && $CI_OPEN_MERGE_REQUESTS
      when: never
    - if: $CI_COMMIT_BRANCH

stages:
  - build
  - test
  - analyse
  - deploy_artefact
  - release
  - deploiement

# ─────────────────────────────────────────────
# BUILD
# ─────────────────────────────────────────────

build:
  script:
    - echo "Building"
    - ./mvnw $MAVEN_OPTS -Dmaven.test.failure.ignore=true clean package
    - ./mvnw -s settings.xml deploy
    - cat application/target/site/jacoco/index.html
  coverage: /Total.*?([0-9]{1,3})%/
  artifacts:
    paths:
      - $ARTEFACT
    reports:
      junit:
        - application/target/surefire-reports/*.xml
        - library/target/surefire-reports/*.xml

# ─────────────────────────────────────────────
# BUILD IMAGE
# ─────────────────────────────────────────────

build-image:
  image: docker
  stage: deploy_artefact
  script:
    - mv $ARTEFACT .
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - |
      if [ -n "$CI_COMMIT_TAG" ]; then
        IMAGE_TAG=$CI_COMMIT_TAG
      elif [ -n "$CI_MERGE_REQUEST_SOURCE_BRANCH_NAME" ]; then
        IMAGE_TAG=$(echo $CI_MERGE_REQUEST_SOURCE_BRANCH_NAME | tr '/' '-')
      else
        IMAGE_TAG=$(echo $CI_COMMIT_BRANCH | tr '/' '-')
      fi
    - docker build -t $CI_REGISTRY_IMAGE:$IMAGE_TAG .
    - docker push $CI_REGISTRY_IMAGE:$IMAGE_TAG
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_TAG =~ /^v.*/
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

# ─────────────────────────────────────────────
# REVIEW — déploiement par branche sur kind
# ─────────────────────────────────────────────

deploy_review:
  stage: deploiement
  image: bitnami/kubectl:latest
  script:
    - |
      if [ -n "$CI_MERGE_REQUEST_SOURCE_BRANCH_NAME" ]; then
        NAMESPACE=$(echo $CI_MERGE_REQUEST_SOURCE_BRANCH_NAME | tr '/' '-' | tr '[:upper:]' '[:lower:]')
      else
        NAMESPACE=$(echo $CI_COMMIT_BRANCH | tr '/' '-' | tr '[:upper:]' '[:lower:]')
      fi
    # Création du namespace (idempotent)
    - kubectl create namespace $NAMESPACE --dry-run=client -o yaml | kubectl apply -f -
    # Déploiement du Deployment + Service NodePort
    - |
      cat <<EOF | kubectl apply -f -
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: app
        namespace: $NAMESPACE
      spec:
        replicas: 1
        selector:
          matchLabels:
            app: review
        template:
          metadata:
            labels:
              app: review
          spec:
            containers:
            - name: app
              image: $CI_REGISTRY_IMAGE:$NAMESPACE
              ports:
              - containerPort: 8080
      ---
      apiVersion: v1
      kind: Service
      metadata:
        name: app
        namespace: $NAMESPACE
      spec:
        type: NodePort
        selector:
          app: review
        ports:
        - port: 8080
          targetPort: 8080
      EOF
    # Attente que le déploiement soit prêt
    - kubectl rollout status deployment/app -n $NAMESPACE --timeout=60s
    # Récupération de l'URL dynamique via le NodePort attribué
    - NODE_PORT=$(kubectl get svc app -n $NAMESPACE -o jsonpath='{.spec.ports[0].nodePort}')
    - NODE_IP=$(kubectl get nodes -o jsonpath='{.items[0].status.addresses[?(@.type=="InternalIP")].address}')
    - echo "APP_URL=http://$NODE_IP:$NODE_PORT" >> deploy.env
  artifacts:
    reports:
      dotenv: deploy.env   # rend $APP_URL disponible pour l'environment URL
  environment:
    name: review/$CI_COMMIT_REF_NAME
    url: $APP_URL           # URL dynamique injectée par le dotenv
    on_stop: stop_review    # référence le job de nettoyage
    auto_stop_in: 1 day
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

# ─────────────────────────────────────────────
# STOP REVIEW — nettoyage du namespace kind
# ─────────────────────────────────────────────

stop_review:
  stage: deploiement
  image: bitnami/kubectl:latest
  script:
    - |
      if [ -n "$CI_MERGE_REQUEST_SOURCE_BRANCH_NAME" ]; then
        NAMESPACE=$(echo $CI_MERGE_REQUEST_SOURCE_BRANCH_NAME | tr '/' '-' | tr '[:upper:]' '[:lower:]')
      else
        NAMESPACE=$(echo $CI_COMMIT_BRANCH | tr '/' '-' | tr '[:upper:]' '[:lower:]')
      fi
    - echo "Suppression du namespace $NAMESPACE"
    - kubectl delete namespace $NAMESPACE --ignore-not-found=true
  environment:
    name: review/$CI_COMMIT_REF_NAME
    action: stop             # obligatoire pour le on_stop
  when: manual
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      when: manual

# ─────────────────────────────────────────────
# RELEASE
# ─────────────────────────────────────────────

release_job:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  rules:
    - if: $CI_COMMIT_TAG
      when: never
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  script:
    - echo "Creating release v0.$CI_PIPELINE_IID"
  release:
    tag_name: 'v0.$CI_PIPELINE_IID'
    description: 'v0.$CI_PIPELINE_IID'
    ref: '$CI_COMMIT_SHA'
    assets:
      links:
        - name: 'jar'
          url: 'https://gitlab.formation.org/$CI_PROJECT_PATH/-/jobs/$CI_JOB_ID/artifacts/raw/application/target/application-0.$CI_PIPELINE_IID.jar'
        - name: 'pom'
          url: 'https://gitlab.formation.org/$CI_PROJECT_PATH/-/jobs/$CI_JOB_ID/artifacts/raw/application/pom.xml'

# ─────────────────────────────────────────────
# STAGING — namespace fixe sur kind
# ─────────────────────────────────────────────

deploy_staging:
  stage: deploiement
  image: bitnami/kubectl:latest
  script:
    - kubectl create namespace staging --dry-run=client -o yaml | kubectl apply -f -
    - |
      cat <<EOF | kubectl apply -f -
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: app
        namespace: staging
      spec:
        replicas: 1
        selector:
          matchLabels:
            app: staging
        template:
          metadata:
            labels:
              app: staging
          spec:
            containers:
            - name: app
              image: $CI_REGISTRY_IMAGE:$CI_DEFAULT_BRANCH
              ports:
              - containerPort: 8080
      ---
      apiVersion: v1
      kind: Service
      metadata:
        name: app
        namespace: staging
      spec:
        type: NodePort
        selector:
          app: staging
        ports:
        - port: 8080
          targetPort: 8080
          nodePort: 30001
      EOF
    - kubectl rollout status deployment/app -n staging --timeout=60s
  environment:
    name: staging
    url: http://localhost:30001
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# ─────────────────────────────────────────────
# PRODUCTION — namespace fixe sur kind
# ─────────────────────────────────────────────

deploy_prod:
  stage: deploiement
  image: bitnami/kubectl:latest
  script:
    - kubectl create namespace production --dry-run=client -o yaml | kubectl apply -f -
    - |
      cat <<EOF | kubectl apply -f -
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: app
        namespace: production
      spec:
        replicas: 1
        selector:
          matchLabels:
            app: production
        template:
          metadata:
            labels:
              app: production
          spec:
            containers:
            - name: app
              image: $CI_REGISTRY_IMAGE:$CI_COMMIT_TAG
              ports:
              - containerPort: 8080
      ---
      apiVersion: v1
      kind: Service
      metadata:
        name: app
        namespace: production
      spec:
        type: NodePort
        selector:
          app: production
        ports:
        - port: 8080
          targetPort: 8080
          nodePort: 30080
      EOF
    - kubectl rollout status deployment/app -n production --timeout=60s
  environment:
    name: production
    url: http://localhost:30080
  rules:
    - if: $CI_COMMIT_TAG =~ /^v.*/
      when: manual