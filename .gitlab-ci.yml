include:
  - project: 'formation/gabarit'
    ref: main
    file: '/maven-template.yml'
  - template: Security/SAST.gitlab-ci.yml
  - template: Security/Secret-Detection.gitlab-ci.yml
variables:
  ARTEFACT: application/target/*.jar
  INTEGRATION_URL: /home/gitlab-runner


stages:
  - build
  - test
  - analyse
  - deploy_artefact
  - deploiement

  
build:
  script:
    - echo "Building"
    - ./mvnw $MAVEN_OPTS -Dmaven.test.failure.ignore=true package
    - cat application/target/site/jacoco/index.html
  coverage: /Total.*?([0-9]{1,3})%/
  artifacts:
    paths:
      - $ARTEFACT  
    reports:
      junit: 
        - application/target/surefire-reports/*.xml  
        - library/target/surefire-reports/*.xml  


build-image:
  image: docker
  stage: deploy_artefact
  script:
    - mv $ARTEFACT .
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - docker build -t $CI_REGISTRY_IMAGE:$CI_COMMIT_BRANCH .  # ← tag = branche
    - docker push $CI_REGISTRY_IMAGE:$CI_COMMIT_BRANCH

deploy_review:
  stage: deploiement
  image: docker
  variables:
    PORT: 8080
  script:
    - echo "Deploy a review app"
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY  # ← auth GitLab
    - docker stop $CI_COMMIT_BRANCH || true
    - docker rm $CI_COMMIT_BRANCH || true
    - docker run -d -p :8080 --name $CI_COMMIT_BRANCH $CI_REGISTRY_IMAGE:$CI_COMMIT_BRANCH  # ← registre GitLab
    - docker port $CI_COMMIT_BRANCH 8080 | cut -d ":" -f2
    - PORT=$(docker port $CI_COMMIT_BRANCH 8080 | cut -d ":" -f2)
    - echo "http://localhost:$PORT"
  environment:
    name: review/$CI_COMMIT_REF_NAME
    # url supprimée ← le vrai port reste lisible dans les logs du job
    # url: http://localhost:$PORT
  only:
    - branches
  except:
    - main

deploy_staging:
  stage: deploiement
  image: docker
  script:
    - echo "Deploy to staging server"
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY  # ← auth GitLab
    - docker stop $CI_COMMIT_BRANCH || true
    - docker rm $CI_COMMIT_BRANCH || true
    - docker run -d -p 7979:8080 --name $CI_COMMIT_BRANCH $CI_REGISTRY_IMAGE:$CI_COMMIT_BRANCH  # ← registre GitLab
  environment:
    name: staging
    url: http://localhost:7979
  only:
    - main

deploy_prod:
  stage: deploiement
  image: docker
  script:
    - echo "Deploy to production server"
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY  # ← auth GitLab
    - docker stop $CI_COMMIT_BRANCH || true
    - docker rm $CI_COMMIT_BRANCH || true
    - docker run -d -p 8080:8080 --name $CI_COMMIT_BRANCH $CI_REGISTRY_IMAGE:$CI_COMMIT_BRANCH  # ← registre GitLab
  environment:
    name: production
    url: http://localhost:8080
  when: manual
  only:
    - main